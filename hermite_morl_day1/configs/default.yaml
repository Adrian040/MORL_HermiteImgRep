project_root: .
seed: 0

dataset:
  raw_dir: data/raw
  use_skimage_if_empty: true
  image_size: 64
  train_images: 40
  val_images: 10
  test_images: 10

hermite:
  max_order: 3
  sigma: 1.5
  kernel_size: 11

evaluation:
  ks: [1, 3, 5, 10]

env:
  max_steps: 10
  reward_dim: 4
  calibrated_reconstruction: true
  repeated_action_penalty: 0.05
  terminate_on_repeated_action: false
  random_episode_steps: 11
