project_root: .
seed: 0

dataset:
  raw_dir: data/raw
  use_skimage_if_empty: true
  image_size: 32
  train_images: 8
  val_images: 3
  test_images: 3

hermite:
  max_order: 2
  sigma: 1.5
  kernel_size: 7

evaluation:
  ks: [1, 3, 5, 6]

env:
  max_steps: 6
  reward_dim: 4
  calibrated_reconstruction: true
  repeated_action_penalty: 0.05
  terminate_on_repeated_action: false
  random_episode_steps: 7

training:
  episodes: 12
  batch_size: 8
  replay_size: 1000
  gamma: 0.95
  lr: 0.001
  hidden_dim: 64
  warmup_steps: 8
  target_update_every: 20
  eval_every: 6
  eval_max_images: 2
  epsilon_start: 1.0
  epsilon_end: 0.10
  epsilon_decay_steps: 50
  use_envelope_target: true
  device: cpu
  preferences:
    - [0.55, 0.25, 0.10, 0.10]
    - [0.35, 0.35, 0.15, 0.15]
    - [0.25, 0.25, 0.25, 0.25]
    - [0.20, 0.20, 0.30, 0.30]
    - [0.15, 0.15, 0.35, 0.35]
