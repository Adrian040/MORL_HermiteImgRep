project_root: .
seed: 0

dataset:
  raw_dir: data/raw
  use_skimage_if_empty: true
  image_size: 64
  train_images: 40
  val_images: 10
  test_images: 10

hermite:
  max_order: 4
  sigma: 1.5
  kernel_size: 11

evaluation:
  ks: [1, 3, 5, 10]

env:
  max_steps: 10
  reward_dim: 4
  calibrated_reconstruction: true
  repeated_action_penalty: 0.05
  terminate_on_repeated_action: false
  random_episode_steps: 11

training:
  episodes: 4000
  batch_size: 64
  replay_size: 50000
  gamma: 0.95
  lr: 0.001
  hidden_dim: 128
  warmup_steps: 128
  target_update_every: 250
  eval_every: 250
  eval_max_images: null
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 4000
  use_envelope_target: true
  device: auto
  preferences:
    - [0.55, 0.25, 0.10, 0.10]
    - [0.35, 0.35, 0.15, 0.15]
    - [0.25, 0.25, 0.25, 0.25]
    - [0.20, 0.20, 0.30, 0.30]
    - [0.15, 0.15, 0.35, 0.35]
